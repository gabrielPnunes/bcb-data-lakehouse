services:

  postgres:
    container_name: postgres-bcb
    image: postgres:16

    environment:
      POSTGRES_DB: bcb_data
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  pgadmin:
    container_name: pgadmin-bcb
    image: dpage/pgadmin4

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - postgres


  spark:
    container_name: spark-bcb
    image: apache/spark:3.5.1

    user: root

    command: >
      bash -c "
      pip install pyspark &&
      mkdir -p /tmp/.ivy2 &&
      chmod -R 777 /tmp/.ivy2 &&
      tail -f /dev/null
      "

    environment:
      - HOME=/tmp
      - IVY_HOME=/tmp/.ivy2

    ports:
      - "8080:8080"
      - "7077:7077"

    volumes:
      - ../:/app

    working_dir: /app


volumes:
  postgres_data: